name: Test pack

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: "Test pack build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      - name: Install Packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh Packwiz Index
        working-directory: modpack
        run: packwiz refresh

      - name: Resolve and Download All Mods
        working-directory: modpack
        run: |
          packwiz serve &
          SERVER_PID=$!

          sleep 2

          cd dist

          java -jar packwiz-installer-bootstrap.jar -g http://localhost:8080/pack.toml

          rm packwiz-installer*

          kill $SERVER_PID
