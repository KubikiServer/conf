services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "NEOFORGE"
      VERSION: "1.21.1"
      MEMORY: "12288M"
      MOTD: "Kubiki Q3 2026\\nPublic testing"
      ICON: "http://confserver:8080/icon.png"
      OVERRIDE_ICON: "true"
      ONLINE_MODE: "false"
      TZ: "Asia/Yekaterinburg"
      DIFFICULTY: "2"
      MODE: "0"
      FORCE_GAMEMODE: "true"
      ENABLE_COMMAND_BLOCK: "true"
      LEVEL_TYPE: "large_biomes"
      OPS: |-
        Tapeline
      PACKWIZ_URL: "http://confserver:8080/pack.toml"
      ALLOW_FLIGHT: "true"
      ACCEPTS_TRANSFERS: "false"
      ENABLE_AUTOPAUSE: "false"
      JVM_OPTS: -XX:+UseZGC -XX:+ZGenerational -XX:+ZUncommit
      VIEW_DISTANCE: "6"
      SIMULATION_DISTANCE: "4"
    volumes:
      - "./data:/data"
    networks:
      - main
    depends_on:
      confserver:
        condition: service_started
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '4'
        reservations:
          cpus: '3'

  backup:
    image: itzg/mc-backup
    restart: unless-stopped
    environment:
      BACKUP_INTERVAL: "12h"
      RCON_HOST: mc
      INITIAL_DELAY: 0
    volumes:
      - ./data:/data:ro
      - ./world-backups:/backups
    networks:
      - main
    depends_on:
      confserver:
        condition: service_started

  confserver:
    image: python:slim
    hostname: confserver
    command: python3 -m http.server -b 0.0.0.0 8080
    working_dir: /conf
    expose:
      - "8080"
    volumes:
      - ./modpack:/conf
      - ./icon.png:/conf/icon.png
    networks:
      - main

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - main

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M


networks:
  main:
    driver: bridge


volumes:
  portainer_data:
