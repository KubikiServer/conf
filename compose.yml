services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "NEOFORGE"
      VERSION: "1.21.1"
      MEMORY: "12288M"
      MOTD: "Kubiki Q3 2026\\nPublic testing"
      ICON: "http://confserver:8080/icon.png"
      OVERRIDE_ICON: "true"
      ONLINE_MODE: "false"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      TZ: "Asia/Yekaterinburg"
      DIFFICULTY: "2"
      MODE: "1"
      FORCE_GAMEMODE: "true"
      ENABLE_COMMAND_BLOCK: "true"
      LEVEL_TYPE: "large_biomes"
      OPS: |-
        Tapeline
      PACKWIZ_URL: "http://confserver:8080/pack.toml"
      ALLOW_FLIGHT: "true"
      ACCEPTS_TRANSFERS: "false"
      ENABLE_AUTOPAUSE: "false"
    volumes:
      - "./data:/data"
    networks:
      - main
    depends_on:
      confserver:
        condition: service_started
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20

  confserver:
    image: python:slim
    hostname: confserver
    command: python3 -m http.server -b 0.0.0.0 8080
    working_dir: /conf
    expose:
      - "8080"
    volumes:
      - ./modpack:/conf
      - ./icon.png:/conf/icon.png
    networks:
      - main

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9443"
    volumes:
      - portainer_data:/data
    networks:
      - main


networks:
  main:
    driver: bridge


volumes:
  portainer_data:
